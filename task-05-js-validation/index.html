<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 | JavaScript Form Validation</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <nav>
        <div class="logo">&lt;ZG /&gt;</div>
        <a href="../task-03-responsive-portfolio/index.html" class="back-btn">&larr; Back to Portfolio</a>
    </nav>

    <main class="form-container">
        <div class="card">
            <h2>Get In Touch</h2>
            <p class="subtitle">Please fill out the form below to contact me. All fields are required.</p>
            
            <div id="success-alert" class="alert success-alert hidden"></div>

            <form id="contactForm" novalidate>
                
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name">
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@domain.com">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="e.g., 03049839039">
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here (minimum 20 characters)..."></textarea>
                    <span class="error-message" id="messageError"></span>
                </div>

                <button type="submit" id="submitBtn">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Zaryab Ghumman. Task 5 - Secure Form Validation Practice.</p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
